<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - 织金苗语语音识别系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>织金苗语语音识别系统</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/">首页</a></li>
                <li><a href="/recognize">语音识别</a></li>
                <li><a href="/template-library">模板管理</a></li>
                <li><a href="/history" class="active">历史记录</a></li>
                <li><a href="/statistics">统计分析</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div>
                    <h2>历史记录</h2>
                    <p>最近 100 条记录。</p>
                </div>
                <button class="btn btn-primary" id="refreshBtn">刷新</button>
            </div>

            <section class="history-shell">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>结果</th>
                            <th>置信度</th>
                            <th>距离</th>
                            <th>耗时</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr>
                            <td colspan="6" class="loading-cell">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </section>

            <div class="error-section" id="errorSection" style="display: none;">
                <div class="error-message" id="errorMessage"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>基于DTW模板匹配的织金苗语小词表语音识别系统 | 西南民族大学</p>
        </div>
    </footer>

    <script>
        async function loadHistory() {
            const historyBody = document.getElementById('historyBody');
            const errorSection = document.getElementById('errorSection');
            errorSection.style.display = 'none';
            historyBody.innerHTML = '<tr><td colspan="6" class="loading-cell">加载中...</td></tr>';

            try {
                const response = await fetch('/recognition/history');
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '加载失败');
                }

                if (!Array.isArray(data) || data.length === 0) {
                    historyBody.innerHTML = '<tr><td colspan="6" class="loading-cell">暂无记录</td></tr>';
                    return;
                }

                historyBody.innerHTML = data.map(item => `
                    <tr>
                        <td>${item.createdAt || '-'}</td>
                        <td><span class="result-badge">${item.wordText || item.wordId || '未识别'}</span></td>
                        <td><span class="confidence-badge">${item.confidence != null ? (item.confidence * 100).toFixed(1) + '%' : '-'}</span></td>
                        <td>${item.distance != null ? item.distance.toFixed(4) : '-'}</td>
                        <td>${item.processingTimeMs != null ? item.processingTimeMs + ' ms' : '-'}</td>
                        <td><span class="status-badge ${item.rejected ? 'rejected' : 'recognized'}">${item.rejected ? '拒识' : '已识别'}</span></td>
                    </tr>
                `).join('');
            } catch (error) {
                historyBody.innerHTML = '<tr><td colspan="6" class="loading-cell">加载失败</td></tr>';
                document.getElementById('errorMessage').textContent = '历史记录加载失败: ' + error.message;
                errorSection.style.display = 'block';
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', loadHistory);
        loadHistory();
    </script>
</body>
</html>
