<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - 织金苗语语音识别系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>织金苗语语音识别系统</h1>
            </div>
            <div class="nav-side">
                <ul class="nav-menu">
                    <li><a href="/">首页</a></li>
                    <li><a href="/recognize">语音识别</a></li>
                    <li th:if="${isAdmin}"><a href="/template-library">模板管理</a></li>
                    <li><a href="/history">历史记录</a></li>
                    <li><a href="/statistics" class="active">统计分析</a></li>
                </ul>
                <div class="nav-user-menu">
                    <button class="nav-user-trigger" type="button">
                        <span class="user-pill">
                            <span th:text="${currentUser.username}">user</span>
                            <span th:if="${isAdmin}">管理员</span>
                        </span>
                    </button>
                    <div class="nav-dropdown">
                        <a class="nav-dropdown-link" href="/profile">个人信息</a>
                        <a class="nav-dropdown-link" href="/auth/logout">退出</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div>
                    <h2>统计分析</h2>
                    <p>查看当前识别结果的基础统计信息。</p>
                </div>
                <button class="btn btn-primary" id="refreshBtn">刷新</button>
            </div>

            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总识别次数</div>
                    <div class="stat-value" id="totalCount">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">成功识别数</div>
                    <div class="stat-value" id="correctCount">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">识别率</div>
                    <div class="stat-value" id="accuracy">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">平均置信度</div>
                    <div class="stat-value" id="avgConfidence">-</div>
                </div>
            </section>

            <section class="history-shell">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>项目</th>
                            <th>值</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>识别方法</td><td>DTW 模板匹配</td></tr>
                        <tr><td>特征</td><td>39 维 MFCC</td></tr>
                        <tr><td>预处理</td><td>VAD</td></tr>
                        <tr><td>模板维护</td><td th:text="${isAdmin} ? '管理员可维护' : '当前账号无管理权限'">管理员可维护</td></tr>
                    </tbody>
                </table>
            </section>

            <div class="error-section" id="errorSection" style="display: none;">
                <div class="error-message" id="errorMessage"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>基于DTW模板匹配的织金苗语小词表语音识别系统 | 西南民族大学</p>
        </div>
    </footer>

    <script>
        async function loadStatistics() {
            const errorSection = document.getElementById('errorSection');
            const errorMessage = document.getElementById('errorMessage');
            errorSection.style.display = 'none';

            try {
                const response = await fetch('/recognition/statistics');
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || '获取统计失败');
                }

                document.getElementById('totalCount').textContent = data.totalRecognitions ?? 0;
                document.getElementById('correctCount').textContent = data.recognizedCount ?? 0;
                document.getElementById('accuracy').textContent = ((data.accuracy || 0) * 100).toFixed(1) + '%';
                document.getElementById('avgConfidence').textContent = ((data.averageConfidence || 0) * 100).toFixed(1) + '%';
            } catch (error) {
                errorMessage.textContent = error.message;
                errorSection.style.display = 'block';
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', loadStatistics);
        loadStatistics();
    </script>
</body>
</html>
