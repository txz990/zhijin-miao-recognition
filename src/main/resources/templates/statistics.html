<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - 织金苗语语音识别系统</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>织金苗语语音识别系统</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/">首页</a></li>
                <li><a href="/recognize">语音识别</a></li>
                <li><a href="/template-library">模板管理</a></li>
                <li><a href="/history">历史记录</a></li>
                <li><a href="/statistics" class="active">统计分析</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div>
                    <h2>统计分析</h2>
                    <p>当前库内识别统计。</p>
                </div>
                <button class="btn btn-primary" id="refreshBtn">刷新</button>
            </div>

            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总识别次数</div>
                    <div class="stat-value" id="totalCount">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">高置信识别数</div>
                    <div class="stat-value" id="correctCount">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">准确率</div>
                    <div class="stat-value" id="accuracy">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">平均置信度</div>
                    <div class="stat-value" id="avgConfidence">-</div>
                </div>
            </section>

            <section class="history-shell">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>项目</th>
                            <th>值</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>识别方法</td>
                            <td>DTW 模板匹配</td>
                        </tr>
                        <tr>
                            <td>特征</td>
                            <td>39 维 MFCC</td>
                        </tr>
                        <tr>
                            <td>端点检测</td>
                            <td>VAD</td>
                        </tr>
                        <tr>
                            <td>模板管理</td>
                            <td>基础重建接口</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>基于DTW模板匹配的织金苗语小词表语音识别系统 | 西南民族大学</p>
        </div>
    </footer>

    <script>
        async function loadStatistics() {
            try {
                const response = await fetch('/recognition/statistics');
                const data = await response.json();

                document.getElementById('totalCount').textContent = data.totalRecognitions || 0;
                document.getElementById('correctCount').textContent = data.correctRecognitions || 0;
                document.getElementById('accuracy').textContent = ((data.accuracy || 0) * 100).toFixed(1) + '%';
                document.getElementById('avgConfidence').textContent = ((data.averageConfidence || 0) * 100).toFixed(1) + '%';
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        document.getElementById('refreshBtn').addEventListener('click', loadStatistics);
        loadStatistics();
    </script>
</body>
</html>
